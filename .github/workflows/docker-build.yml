name: Docker Build and Push
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install dependencies
        run: yarn install
      - name: Build and push Docker images
        run: |
          docker build -t mani2721/server:latest ./app/server
          docker push mani2721/server:latest
          docker build -t mani2721/client:latest ./app/client
          docker push mani2721/client:latest
          docker build -t mani2721/shared:latest ./app/shared
          docker push mani2721/shared:latest
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          CONTENTFUL_SPACE_ID: ${{ secrets.CONTENTFUL_SPACE_ID }}
          CONTENTFUL_ENVIROMENT_ID: ${{ secrets.CONTENTFUL_ENVIROMENT_ID }}
          CONTENTFUL_ACCESS_TOKEN: ${{ secrets.CONTENTFUL_ACCESS_TOKEN }}
          CLIENT_URL: ${{ secrets.CLIENT_URL }}
