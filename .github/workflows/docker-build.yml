name: Docker Build and Push
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: yarn install

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker images
        run: |
          docker build -t mani2721/gyaani-quiz/shared:latest ./packages/shared
          docker push mani2721/gyaani-quiz/shared:latest
          docker build -t mani2721/gyaani-quiz/server:latest ./packages/server
          docker push mani2721/gyaani-quiz/server:latest
          docker build -t mani2721/gyaani-quiz/client:latest ./packages/client
          docker push mani2721/gyaani-quiz/client:latest
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          CONTENTFUL_SPACE_ID: ${{ secrets.CONTENTFUL_SPACE_ID }}
          CONTENTFUL_ENVIROMENT_ID: ${{ secrets.CONTENTFUL_ENVIROMENT_ID }}
          CONTENTFUL_ACCESS_TOKEN: ${{ secrets.CONTENTFUL_ACCESS_TOKEN }}
          CLIENT_URL: ${{ secrets.CLIENT_URL }}
